<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>笠幡駅 発車案内</title>

<style>

body{
background:black;
color:#ff9900;
font-family: monospace;
margin:30px;
}

h1{
color:white;
}

#datetime{
font-size:26px;
margin-bottom:10px;
}

table{
width:100%;
border-collapse:collapse;
font-size:28px;
}

th{
border-bottom:2px solid #ff9900;
padding:10px;
text-align:left;
}

td{
padding:12px;
}

.dest{
font-size:34px;
font-weight:bold;
}

.remain{
color:#00ffff;
}

.status{
color:white;
}

/* スクロール案内 */

.ticker{
position:fixed;
bottom:0;
left:0;
width:100%;
background:black;
color:#00ffff;
overflow:hidden;
white-space:nowrap;
font-size:22px;
border-top:2px solid #ff9900;
padding:8px 0;
}

.ticker span{
display:inline-block;
padding-left:100%;
animation:scroll 25s linear infinite;
}

@keyframes scroll{
0%{transform:translateX(0);}
100%{transform:translateX(-100%);}
}

@media screen and (max-width: 600px){

body{
margin:10px;
}

h1{
font-size:28px;
text-align:center;
margin-bottom:10px;
}

#datetime{
font-size:18px;
text-align:center;
margin-bottom:15px;
}

table{
width:100%;
font-size:18px;
}

thead{
display:none;
}

tr{
display:block;
border-bottom:2px solid #ff9900;
padding:12px 0;
margin-bottom:10px;
}

td{
display:block;
padding:4px 0;
}

td:nth-child(1),
td:nth-child(2){
display:inline-block;
width:48%;
font-size:24px;
font-weight:bold;
}

td:nth-child(3){
display:block;
font-size:24px;
font-weight:bold;
margin-top:8px;
}

td:nth-child(4){
font-size:18px;
margin-top:5px;
}

td:nth-child(5){
font-size:20px;
color:white;
margin-top:3px;
}

.dest{
font-size:24px;
}

.ticker{
font-size:24px;
height:50px;
padding:10px 0;
}

.ticker span{
font-size:24px;
line-height:50px;
}

}
</style>

</head>

<body>

<div id="datetime"></div>

<table>

<thead>
<tr>
<th>時刻</th>
<th>行先</th>
<th>あと</th>
<th>下校目安</th>
<th>案内</th>
</tr>
</thead>

<tbody id="board">
</tbody>

</table>

</div>

// スクロール案内

"駆け込み乗車は列車の安全運行が損なわれる大変危険な行為です。絶対にお辞めください。",
"この案内板は自然科学部が制作しました。ウェブサイト化しているのでスマートフォンでもご覧になれます。URLは https://akira3586gtr-svg.github.io/train_board/",
"電車内での携帯電話の使用マナーにご協力お願い致します。",
"電車の時刻は2026年3月現在(ダイヤ改正後)のものです。また時刻表はサイト制作者が手入力で入れているため、電車の時刻に間違いがある可能性がございます。間違いを発見した場合、お手数ですが自然科学部までご連絡お願い致します。",
"[広告]自然科学部は化学実験からロボット製作、プログラミングなど幅広い活動をしている部活です！ご興味のある方はぜひ活動日(火、金曜日)の2階地学実験室にお越しください！",
"この案内板では電車の遅延、運休等のお知らせは表示していません。最新の運行情報はJR東日本公式ホームページをご確認ください。時間に余裕を持った行動をお願い致します。"
]

let msg_index = 0

function changeMessage(){
const info = document.getElementById("info")

info.innerText = messages[msg_index]

msg_index = (msg_index + 1) %
messages.length
}


    


// 平日ダイヤ

[17*60+7,"川越"],[17*60+14,"八王子"],[17*60+32,"川越"],[17*60+40,"八王子"],[17*60+49,"川越"],[17*60+59,"高麗川"],

function judge(diff){
if(diff >= WALK) return "余裕があります"
if(diff >= FAST) return "歩きで間に合います"
if(diff >= DASH) return "早歩きで間に合います"
return "次の電車をおすすめ"
}

function update(){

let now = new Date()

let Y=now.getFullYear()
let M=now.getMonth()+1
let D=now.getDate()

let h=now.getHours()
let m=now.getMinutes()
let s=now.getSeconds()

const weekday = ["日","月","火","水","木","金","土"]
let w = weekday[now.getDay()]

document.getElementById("datetime").innerText =
`${Y}/${M}/${D}(${w}) ${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`

let now_time = h*60+m

let trains = (now.getDay()==0 || now.getDay()==6) ? holiday_trains : weekday_trains

let html=""
let count=0

for(let t of trains){

let diff=t[0]-now_time

if(t[0]>=now_time){

let th=Math.floor(t[0]/60)
let tm=t[0]%60

let leave = t[0] - WALK
let lh = Math.floor(leave/60)
let lm = leave%60

const isMobile = window.innerWidth <= 600

if(isMobile){
html += `
<tr>
<td>${String(th).padStart(2,'0')}:${String(tm).padStart(2,'0')}発</td>
<td class="dest">${t[1]}</td>
<td class="remain">あと ${diff}分</td>
<td>下校目安 ${String(lh).padStart(2,'0')}:${String(lm).padStart(2,'0')}</td>
<td class="status">${judge(diff)}</td>
</tr>
`
}else{
html += `
<tr>
<td>${String(th).padStart(2,'0')}:${String(tm).padStart(2,'0')}</td>
<td class="dest">${t[1]}</td>
<td class="remain">${diff}分</td>
<td>${String(lh).padStart(2,'0')}:${String(lm).padStart(2,'0')}</td>
<td class="status">${judge(diff)}</td>
</tr>
`
}

count++
if(count==5) break
}

}

document.getElementById("board").innerHTML = html

}

update()
setInterval(update,1000)

const ticker =
document.getElementById("info")

ticker.addEventListener("animationiteration" , () => {
changeMessage()})

changeMessage()
</script>

</body>
</html>

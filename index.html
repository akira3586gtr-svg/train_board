function judge(diff){
if(diff >= WALK) return "余裕があります"
if(diff >= FAST) return "歩きで間に合います"
if(diff >= DASH) return "早歩きで間に合います"
return "次の電車をおすすめ"
}

function update(){

let now = new Date()

let Y=now.getFullYear()
let M=now.getMonth()+1
let D=now.getDate()

let h=now.getHours()
let m=now.getMinutes()
let s=now.getSeconds()

document.getElementById("datetime").innerText =
`${Y}/${M}/${D} ${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`

let now_time = h*60+m

let trains = (now.getDay()==0 || now.getDay()==6) ? holiday_trains : weekday_trains

let html=""
let count=0
let leave_text=""

for(let t of trains){

let diff=t[0]-now_time

if(t[0]>=now_time){

let th=Math.floor(t[0]/60)
let tm=t[0]%60

if(count==0){
let leave = t[0] - WALK
let lh = Math.floor(leave/60)
let lm = leave%60

leave_text = `学校を出る目安 ${String(lh).padStart(2,'0')}:${String(lm).padStart(2,'0')}`
}

html += `
<tr>
<td>${String(th).padStart(2,'0')}:${String(tm).padStart(2,'0')}</td>
<td class="dest">${t[1]}</td>
<td class="remain">${diff}分</td>
<td class="status">${judge(diff)}</td>
</tr>
`

count++
if(count==5) break
}

}

document.getElementById("board").innerHTML = html
document.getElementById("leave").innerText = leave_text

}

update()
setInterval(update,1000)

</script>
